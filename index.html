<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HTML + JavaScript + CSS Demo</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 2rem; background:#f7f9fc; color:#222; }
    .container { max-width:720px; margin:0 auto; padding:1.5rem; background:#fff; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    h1 { margin-top:0; }
    .button { display:inline-block; padding:0.5rem 0.9rem; background:#0366d6; color:#fff; border-radius:6px; border:none; cursor:pointer; font-size:1rem; }
    .result { margin-top:1rem; padding:0.8rem; background:#f1f8ff; border-radius:6px; }
    .input { padding:0.5rem; border:1px solid #ddd; border-radius:6px; width:100%; box-sizing:border-box; margin-top:0.5rem; }
    footer { margin-top:1.25rem; font-size:0.9rem; color:#666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demo: HTML + JavaScript + CSS</h1>
    <p>Enter a number and click <strong>Square it</strong> to run the small JavaScript function below.</p>
    <input id="num" class="input" type="number" value="3" />
    <button id="btn" class="button">Square it</button>
    <div id="out" class="result" aria-live="polite">Result will appear here.</div>
    <hr />
    <p>Live clock: <span id="clock">--:--:--</span></p>
    <footer>Small single-file demo — CSS and JS are inline.</footer>
  </div>
  <script>
    // Simple interactive JavaScript
    const btn = document.getElementById('btn');
    const out = document.getElementById('out');
    btn.addEventListener('click', () => {
      const n = Number(document.getElementById('num').value);
      if (Number.isFinite(n)) {
        out.textContent = `${n} × ${n} = ${n * n}`;
      } else {
        out.textContent = 'Please enter a valid number.';
      }
    });

    // Live clock
    function updateClock() {
      const el = document.getElementById('clock');
      const d = new Date();
      el.textContent = d.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
